apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "80"
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - image: tofuvotingappacr.azurecr.io/votingapp/result:30
        name: result
        ports:
        - containerPort: 80
          name: result
      imagePullSecrets:
      - name: acr-secret
