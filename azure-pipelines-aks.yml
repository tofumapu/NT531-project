trigger:
  branches:
    include:
      - dependabot/npm_and_yarn/result/express-4.19.2
  paths:
    include:
      - vote/*
      - result/*
      - worker/*
      - k8s-specifications/*
      - monitoring/*
      - azure-pipelines-aks.yml

pr: none

variables:
  dockerRegistryServiceConnection: 'tofuVotingAppACR'
  kubernetesServiceConnection: 'votingApp-k8s-conn'
  containerRegistry: 'tofuvotingappacr.azurecr.io'
  imageRepository: 'votingapp'
  kubernetesNamespace: 'default'
  monitoringNamespace: 'monitoring'
  tag: '$(Build.BuildId)'
  # GRAFANA_ADMIN_PASSWORD: set as a secret variable in Azure DevOps Pipeline settings
  # (Pipelines > Edit > Variables > + Add > check "Keep this value secret")

stages:
- stage: BuildAndPush
  displayName: Build and Push Images
  jobs:
  - job: Build
    displayName: Build and Push Vote, Result, Worker
    pool:
      name: 'votingApp-Agent'
    steps:
    - checkout: self

    - task: Docker@2
      displayName: Build vote image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)/vote'
        command: 'build'
        Dockerfile: 'vote/Dockerfile'
        buildContext: 'vote'
        tags: |
          $(tag)
          latest
        arguments: '--network=host'

    - task: Docker@2
      displayName: Push vote image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)/vote'
        command: 'push'
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: Build result image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)/result'
        command: 'build'
        Dockerfile: 'result/Dockerfile'
        buildContext: 'result'
        tags: |
          $(tag)
          latest
        arguments: '--network=host'

    - task: Docker@2
      displayName: Push result image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)/result'
        command: 'push'
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: Build worker image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)/worker'
        command: 'build'
        Dockerfile: 'worker/Dockerfile'
        buildContext: 'worker'
        tags: |
          $(tag)
          latest
        arguments: '--network=host'

    - task: Docker@2
      displayName: Push worker image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)/worker'
        command: 'push'
        tags: |
          $(tag)
          latest

- stage: DeployToAKS
  displayName: Deploy to AKS
  dependsOn: BuildAndPush
  jobs:
  - job: Deploy
    displayName: Apply Kubernetes Manifests
    pool:
      name: 'votingApp-Agent'
    steps:
    - checkout: self

    - task: Bash@3
      displayName: Prepare manifests for AKS deployment
      inputs:
        targetType: 'inline'
        script: |
          set -euxo pipefail

          MANIFEST_DIR="$(Pipeline.Workspace)/manifests"
          rm -rf "$MANIFEST_DIR"
          mkdir -p "$MANIFEST_DIR"
          cp -R k8s-specifications/. "$MANIFEST_DIR/"
          # Files with namespace 'monitoring' are applied separately in DeployMonitoring stage
          rm -f "$MANIFEST_DIR/voteapp-servicemonitors.yaml"
          rm -f "$MANIFEST_DIR/dora-collector-deployment.yaml"
          rm -f "$MANIFEST_DIR/pushgateway-deployment.yaml"
          rm -f "$MANIFEST_DIR/decision-log-deployment.yaml"

          sed -i "s|image:.*|image: $(containerRegistry)/$(imageRepository)/vote:$(tag)|" \
            "$MANIFEST_DIR/vote-deployment.yaml"
          sed -i "s|image:.*|image: $(containerRegistry)/$(imageRepository)/result:$(tag)|" \
            "$MANIFEST_DIR/result-deployment.yaml"
          sed -i "s|image:.*|image: $(containerRegistry)/$(imageRepository)/worker:$(tag)|" \
            "$MANIFEST_DIR/worker-deployment.yaml"

          # AKS should pull directly from ACR after attach-acr, so old pull secrets are removed.
          sed -i '/imagePullSecrets:/,+1d' "$MANIFEST_DIR/vote-deployment.yaml"
          sed -i '/imagePullSecrets:/,+1d' "$MANIFEST_DIR/result-deployment.yaml"
          sed -i '/imagePullSecrets:/,+1d' "$MANIFEST_DIR/worker-deployment.yaml"

    - task: Kubernetes@1
      displayName: kubectl apply base manifests
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(kubernetesNamespace)'
        command: 'apply'
        useConfigurationFile: true
        configuration: '$(Pipeline.Workspace)/manifests'

    - task: Kubernetes@1
      displayName: kubectl rollout status vote
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(kubernetesNamespace)'
        command: 'rollout'
        arguments: 'status deployment/vote --timeout=180s'

    - task: Kubernetes@1
      displayName: kubectl rollout status result
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(kubernetesNamespace)'
        command: 'rollout'
        arguments: 'status deployment/result --timeout=180s'

    - task: Kubernetes@1
      displayName: kubectl rollout status worker
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(kubernetesNamespace)'
        command: 'rollout'
        arguments: 'status deployment/worker --timeout=180s'

- stage: DeployMonitoring
  displayName: Deploy Monitoring Stack (Prometheus + Grafana)
  dependsOn: DeployToAKS
  jobs:
  - job: DeployMonitoring
    displayName: Helm install kube-prometheus-stack
    pool:
      name: 'votingApp-Agent'
    steps:
    - checkout: self

    - task: Bash@3
      displayName: Helm repo add and update
      inputs:
        targetType: 'inline'
        script: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

    - task: HelmDeploy@0
      displayName: Deploy kube-prometheus-stack
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(monitoringNamespace)'
        command: 'upgrade'
        chartType: 'Name'
        chartName: 'prometheus-community/kube-prometheus-stack'
        releaseName: 'prom-stack'
        valueFile: 'monitoring/prometheus-values.yaml'
        overrideValues: 'grafana.adminPassword=$(GRAFANA_ADMIN_PASSWORD)'
        install: true
        waitForExecution: true
        arguments: '--create-namespace --timeout 5m'

    - task: Kubernetes@1
      displayName: Apply VoteApp alert rules
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(monitoringNamespace)'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'monitoring/voteapp-alert-rules.yaml'

    - task: Kubernetes@1
      displayName: Apply ServiceMonitors
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(monitoringNamespace)'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'k8s-specifications/voteapp-servicemonitors.yaml'

    - task: Kubernetes@1
      displayName: Apply Pushgateway
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(monitoringNamespace)'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'k8s-specifications/pushgateway-deployment.yaml'

    - task: Kubernetes@1
      displayName: Apply DORA Collector
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(monitoringNamespace)'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'k8s-specifications/dora-collector-deployment.yaml'

    - task: Kubernetes@1
      displayName: Apply Decision Log
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(kubernetesServiceConnection)'
        namespace: '$(monitoringNamespace)'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'k8s-specifications/decision-log-deployment.yaml'
