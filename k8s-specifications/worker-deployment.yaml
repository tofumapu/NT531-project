apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: worker
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9090"
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - image: tofuvotingappacr.azurecr.io/votingapp/worker:29
        name: worker
        ports:
        - containerPort: 9090
          name: metrics
