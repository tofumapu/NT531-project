---
# k6-operator CRD: TestRun chạy distributed bên trong AKS
# Yêu cầu: helm install k6-operator grafana/k6-operator -n k6
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-baseline-script
  namespace: k6
data:
  test.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    const voteUrl = __ENV.VOTE_URL || 'http://vote-service.default.svc.cluster.local';
    const choices = ['a', 'b'];

    export const options = {
      stages: [
        { duration: '30s', target: 10 },
        { duration: '5m',  target: 30 },
        { duration: '30s', target: 0 },
      ],
      thresholds: {
        http_req_failed: ['rate<0.01'],
        http_req_duration: ['p(95)<800'],
      },
    };

    export default function () {
      const choice = choices[Math.floor(Math.random() * choices.length)];
      const r = http.post(`${voteUrl}/`, `vote=${choice}`, {
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      });
      check(r, { 'no 5xx': (x) => x.status < 500 });
      sleep(0.5 + Math.random());
    }
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: baseline-internal
  namespace: k6
spec:
  parallelism: 2
  script:
    configMap:
      name: k6-baseline-script
      file: test.js
  arguments: --tag testid=baseline-internal --out experimental-prometheus-rw
  runner:
    env:
      - name: VOTE_URL
        value: "http://vote-service.default.svc.cluster.local"
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: "http://prom-stack-kube-prometheus-prometheus.monitoring.svc:9090/api/v1/write"
      - name: K6_PROMETHEUS_RW_TREND_STATS
        value: "p(95),p(99),min,max,avg,med"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
