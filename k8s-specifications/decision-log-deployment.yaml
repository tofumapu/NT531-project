---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: decision-log-data
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-log
  namespace: monitoring
  labels:
    app: decision-log
    component: agent-evaluation
spec:
  replicas: 1
  strategy:
    type: Recreate  # PVC RWO, không thể RollingUpdate
  selector:
    matchLabels:
      app: decision-log
  template:
    metadata:
      labels:
        app: decision-log
        component: agent-evaluation
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: decision-log
        image: tofuvotingappacr.azurecr.io/decision-log:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: DB_URL
          value: "sqlite:////data/decisions.db"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: "20m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: decision-log-data
---
apiVersion: v1
kind: Service
metadata:
  name: decision-log
  namespace: monitoring
  labels:
    app: decision-log
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
  selector:
    app: decision-log
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: decision-log
  namespace: monitoring
  labels:
    release: prom-stack
spec:
  selector:
    matchLabels:
      app: decision-log
  namespaceSelector:
    matchNames:
    - monitoring
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
