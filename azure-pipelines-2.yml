# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  paths:
    include:
      - worker/*

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: '00f95541-34f4-46c8-81bc-fb3b7dfc34e0'
  imageRepository: 'votingapp'
  containerRegistry: 'tofuvotingappacr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/worker/Dockerfile'
  tag: '$(Build.BuildId)'

pool:
  name: 'votingApp-Agent'

stages:
- stage: Build
  displayName: Build the Worker App
  jobs:
  - job: Build
    displayName: Build
    steps:
    - task: Docker@2
      displayName: Build worker image
      inputs:
        containerRegistry: 'tofuVotingAppACR'
        repository: '$(imageRepository)/worker'
        command: 'build'
        Dockerfile: '$(dockerfilePath)'
        tags: |
          $(tag)

- stage: Push
  displayName: Push the Worker App
  dependsOn: Build
  jobs:
  - job: Push
    displayName: Push
    steps:
    - task: Docker@2
      displayName: Push worker image
      inputs:
        containerRegistry: 'tofuVotingAppACR'
        repository: '$(imageRepository)/worker'
        command: 'push'
        tags: |
          $(tag)

- stage: UpdateManifest
  displayName: Update K8s Manifest
  dependsOn: Push
  jobs:
  - job: UpdateManifest
    displayName: Update worker manifest
    steps:
    - task: Bash@3
      displayName: Run updateK8sManifests.sh for worker
      inputs:
        targetType: 'inline'
        script: |
          sed -i 's/\r$//' scripts/updateK8sManifests.sh
          chmod +x scripts/updateK8sManifests.sh
          bash scripts/updateK8sManifests.sh "worker" "$(imageRepository)" "$(tag)"
